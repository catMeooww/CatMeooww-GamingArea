<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flight Path</title>
    <link rel="shortcut icon" href="plane.png" type="image/png">
    <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-database.js"></script>
    <script src="../p5.dom.min.js"></script>
    <script src="../p5.min.js"></script>
    <script src="../p5.play.js"></script>
    <script src="../p5.sound.min.js"></script>
    <script src="../main.js"></script>
    <script src="maps.js"></script>
    <script src="flight.js"></script>
    <style>
        body {
            overflow: hidden;
            background-color: darkslategray;
            color: white;
        }

        #canvas-div{
            border: 5px ridge black;
            text-align: center;
            background-color: black;
        }

        #menu-div{
            background-color: rgba(0, 0, 0, 0.8);
            border: outset 1px darkslategray;
            text-align: center;
        }

        #menu-div button{
            background-color: rgba(0, 0, 0, 0.8);
            border: outset 2px slategray;
            color: aliceblue;
            margin: 0px;
            padding: 5px;
            width: 10%;
        }

        #button-div{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }

        #data-div p{
            margin: 0px;
        }

        #shootbtn{
            background-color: darkmagenta;
        }
        #usebtn{
            background-color: green;
        }
        #resetbtn{
            background-color: darkorange;
        }
    </style>
</head>
<body>
    <br>
    <div id="menu-div">
        <button id="pauseBTN" onclick="togglePause()">WAITING...</button>
        <button id="leaveBTN" onclick="respawnplayer()">WAITING...</button>
        <button id="connection" style="width: 78%;">Departuring now...</button>
    </div>
    <div id="canvas-div">

    </div>
    <br>
    <div id="control-div">
        <label>Player</label>
        <input id="player-name" placeholder="your nickname">
        <label>Room ID:</label>
        <input id="room-name" placeholder="room">
        <button onclick="joinRoom()">Join Room</button>
        <button onclick="createRoom()">Create Room</button>
    </div>
</body>
</html>
