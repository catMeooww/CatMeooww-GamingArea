<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Multi Dino</title>
    <link rel="shortcut icon" href="cactus.png" type="image/png">
    <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.3.2/firebase-database.js"></script>
    <script src="../p5.dom.min.js"></script>
    <script src="../p5.min.js"></script>
    <script src="../p5.play.js"></script>
    <script src="../p5.sound.min.js"></script>
    <script src="../main.js"></script>
    <script src="maps.js"></script>
    <script src="dino.js"></script>

    <style>
        body {
            overflow: hidden;
            background-color: white;
        }

        #canvas-div{
            border: 2px double darkslategray;
            text-align: center;
        }

        #canvas-div:hover,#top-div:hover,input:hover,button:hover{
            border-color: aliceblue;
        }

        #login-div{
            margin:10px;
            cursor: pointer;
        }

        input,button{
            background-color: white;
            border: 2px solid lightskyblue;
        }

        #top-div{
            background-color: rgba(0, 0, 0, 0.8);
            border: outset 1px darkslategray;
            text-align: center;
        }

        #top-div button{
            background-color: rgba(0, 0, 0, 0.8);
            border: outset 2px slategray;
            color: aliceblue;
            margin: 0px;
            padding: 5px;
            width: 10%;
        }

        #resetbtn{
            float: right;
            border-color: orange;
        }
    </style>
</head>

<body>
    <br>
    <div id="top-div">
        <button id="pauseBTN" onclick="togglePause()">WAITING...</button>
        <button id="leaveBTN" onclick="respawnplayer()">WAITING...</button>
        <button id="connection" style="width: 78%;">Connecting to Dino<label id="dots">...</label></button>
    </div>
    <div id="canvas-div">

    </div>
    <div id="login-div">
        <label>Player</label>
        <input id="player-name" placeholder="your nickname">
        <label>Room ID:</label>
        <input id="room-name" placeholder="room">
        <button onclick="joinRoom()">Join Room</button>
        <button onclick="createRoom()">Create Room</button>
    </div>
</body>

</html>
